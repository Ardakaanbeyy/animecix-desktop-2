name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write      # required: publisher-github needs releases:write

jobs:
  release:
    strategy:
      fail-fast: false       # one platform failing shouldn't kill the other
      matrix:
        include:
          - os: macos-14
            platform: darwin
          - os: windows-latest
            platform: win32
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Verify tag matches package.json version        # D-24
        shell: bash
        run: node scripts/verify-tag.mjs

      - name: Install dependencies
        run: npm ci

      # -------- macOS-only: cert import + ASC key decode --------
      # Use battle-tested apple-actions/import-codesign-certs instead of
      # hand-rolled `security` commands — it correctly sets up the temp
      # keychain, preserves login-keychain in the search list, and handles
      # key-partition-list so codesign can access the private key.
      - name: Import Developer ID certificate
        if: matrix.os == 'macos-14'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}

      - name: Verify signing identity is available
        if: matrix.os == 'macos-14'
        run: |
          echo "--- Available codesigning identities ---"
          security find-identity -v -p codesigning
          echo "--- Keychain search list ---"
          security list-keychain -d user

      - name: Write ASC API key to disk                          # Pitfall 4
        if: matrix.os == 'macos-14'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      # -------- test + build + publish --------
      # Rebuild native modules against Node ABI for vitest; Forge will
      # re-rebuild for Electron ABI during publish via its auto-unpack-natives plugin.
      - name: Rebuild native modules for Node (test ABI)
        shell: bash
        run: npm rebuild better-sqlite3

      - name: Run tests
        run: npm test

      # Build the React-based player page into assets/player/.
      # Forge's packagerConfig.extraResource references this directory,
      # so it must exist before 'electron-forge publish' runs.
      - name: Build player page
        run: npm run build:player

      - name: Build universal macOS (if darwin)
        if: matrix.os == 'macos-14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-forge publish --arch=universal --platform=darwin

      - name: Build Windows (if win32)
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-forge publish --arch=x64 --platform=win32

      # -------- generate + upload electron-updater manifest --------
      - name: Generate and upload latest-mac.yml
        if: matrix.os == 'macos-14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-update-manifest.mjs darwin

      - name: Generate and upload latest.yml
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-update-manifest.mjs win32

      # -------- cleanup (runs even on failure) --------
      # Note: apple-actions/import-codesign-certs creates its own temp
      # keychain and cleans it up at job end; we only clean our own files.
      - name: Cleanup macOS keychain and key file
        if: always() && matrix.os == 'macos-14'
        run: |
          rm -f "$RUNNER_TEMP/AuthKey.p8" || true
